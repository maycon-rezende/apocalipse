<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EVIDÊNCIAS ENCONTRADAS // DOOMSDAY</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Anton&family=Courier+Prime:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
:root{--void:#050505;--panel:#0d0f0c;--amber:#e8a33d;--red:#d21f2c;--ink:#e6e3d6;--dim:#9a9689;--line:#2a2a24;--paper:#cbc4ad;--display:'Anton',sans-serif;--term:'VT323',monospace;--mono:'Courier Prime',monospace}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--void);color:var(--ink);font-family:var(--mono);line-height:1.6;overflow-x:hidden}.scan{position:fixed;inset:0;z-index:20;pointer-events:none;background:repeating-linear-gradient(0deg,transparent 0 3px,rgba(255,255,255,.025) 3px 4px);box-shadow:inset 0 0 170px #000}nav{position:sticky;top:0;z-index:30;display:flex;justify-content:space-between;align-items:center;padding:.9rem 5vw;border-bottom:1px solid var(--line);background:rgba(5,5,5,.95);font:1.05rem var(--term);letter-spacing:.1em;text-transform:uppercase}nav a{color:var(--amber);text-decoration:none}main{width:min(1280px,90vw);margin:auto;padding:4.5rem 0 7rem}.clearance{color:var(--red);font:1.05rem var(--term);letter-spacing:.2em;text-transform:uppercase}h1{font:clamp(3rem,8vw,6.5rem)/.92 var(--display);text-transform:uppercase;margin:.6rem 0 1rem}h1 span{color:var(--red)}.intro{max-width:68ch;color:var(--dim)}.manifest{display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin:2.2rem 0 3.5rem;padding:1rem;border:1px solid var(--line);background:var(--panel);font:1rem var(--term);letter-spacing:.08em;text-transform:uppercase}.manifest b{color:var(--amber)}
.archive{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,300px),1fr));gap:2.2rem;align-items:start}.item{position:relative;padding:.7rem .7rem 2.4rem;background:var(--paper);color:#181611;box-shadow:0 15px 35px #000;transform:rotate(var(--tilt));opacity:0;translate:0 22px;transition:opacity .55s,translate .55s}.item.visible{opacity:1;translate:0 0}.item::before{content:'';position:absolute;top:-8px;left:34%;width:32%;height:18px;background:rgba(169,151,111,.7);transform:rotate(-2deg)}.item button{display:block;width:100%;border:0;background:#111;cursor:zoom-in}.item img{display:block;width:100%;height:auto;max-height:560px;object-fit:contain}.item figcaption{margin-top:.7rem;font:1rem var(--term);text-transform:uppercase}.number{position:absolute;z-index:2;left:-.8rem;top:.8rem;padding:.14rem .55rem;background:var(--red);color:#fff;font:1.1rem var(--term)}.classified{position:absolute;right:.7rem;bottom:.45rem;color:#7e161a;font:1rem var(--display);transform:rotate(-3deg)}
.lightbox{position:fixed;inset:0;z-index:100;display:none;place-items:center;padding:5vw;background:rgba(0,0,0,.96)}.lightbox.open{display:grid}.lightbox img{max-width:92vw;max-height:86vh;border:8px solid var(--paper)}.lightbox button{position:absolute;right:3vw;top:2vw;padding:.4rem .75rem;border:1px solid var(--dim);background:#050505;color:var(--ink);font:1rem var(--term);cursor:pointer}.mei-mode{background-color:#050809;background-image:linear-gradient(rgba(105,187,198,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(105,187,198,.025) 1px,transparent 1px);background-size:32px 32px}.mick-mode .item:hover{box-shadow:0 0 0 1px rgba(61,220,132,.35),0 18px 45px #000}.mei-mode .item::before{background:rgba(116,179,187,.52)}@media(max-width:600px){main{width:92vw;padding-top:3rem}.archive{grid-template-columns:1fr}.item{transform:none}nav{padding:.8rem 4vw;gap:1rem}}@media(prefers-reduced-motion:reduce){.item{opacity:1;translate:none;transition:none}}
.hanson-mode{background-color:#070907;background-image:linear-gradient(rgba(133,145,101,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(133,145,101,.03) 1px,transparent 1px);background-size:42px 42px}.hanson-mode .item::before{background:rgba(179,187,130,.58)}.hanson-mode .item:hover{box-shadow:0 0 0 1px rgba(179,187,130,.42),0 18px 45px #000}.natasha-mode{background-color:#050908;background-image:linear-gradient(rgba(128,201,182,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(128,201,182,.03) 1px,transparent 1px);background-size:36px 36px}.natasha-mode .item::before{background:rgba(128,201,182,.58)}.natasha-mode .item:hover{box-shadow:0 0 0 1px rgba(128,201,182,.42),0 18px 45px #000}
</style>
</head>
<body><div class="scan"></div><nav><strong>DD // COFRE DE EVIDÊNCIAS</strong><a id="back" href="personagem.html">← Retornar ao dossiê</a></nav><main><p class="clearance">Autorização aceita // material não catalogado</p><h1>Evidências <span>encontradas</span></h1><p class="intro" id="intro"></p><div class="manifest"><span>Sujeito: <b id="subject"></b></span><span>Itens recuperados: <b id="count"></b></span><span>Integridade: <b>parcial</b></span></div><div class="archive" id="archive"></div></main><div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Evidência ampliada"><button type="button">✕ Fechar registro</button><img src="" alt=""></div>
<script>
const files={mick:{name:'Mick Bradock',code:'SUBJECT_01 / FBI',intro:'Registros visuais associados a Mick Bradock. Locais, datas e autoria permanecem sob investigação.',photos:['img-bradock/mick.png','img-bradock/mick1.png','img-bradock/mick2.png','img-bradock/mick3.png','img-bradock/mick4.png','img-bradock/mickurbano.png']},mei:{name:'Mei Bradock',code:'SUBJECT_02 / BRADOCK',intro:'Material recuperado de diferentes períodos da vida de Mei Bradock. Parte dos metadados foi removida ou corrompida.',photos:['img-mei/arquitetamei.png','img-mei/mei0.png','img-mei/mei1.png','img-mei/mei2.png','img-mei/mei3.png','img-mei/meicaseira.png','img-mei/meileitura.png','img-mei/meiurbana.png','img-mei/meiurbana2.png','img-mei/meiurbana3.png','img-mei/mel.png','img-mei/mell.png','img-mei/mell1.png','img-mei/mell2.png','img-mei/mell3.png','img-mei/mellissa.png','img-mei/mellissa0.png','img-mei/mellissa1.png','img-mei/mellissa2.png','img-mei/mellissa3.png']},hanson:{name:'Capitão James Hanson',code:'SUBJECT_06 / U.S. ARMY',intro:'Arquivo confidencial de James Hanson. Registros pessoais e operacionais removidos do dossiê de consulta pública.',photos:['img-hanson/hanson1.png','img-hanson/cap.png','img-hanson/cafe.png','img-hanson/cafe2.png','img-hanson/ferias.png','img-hanson/bar.png','img-hanson/urbanohanson.png']},natasha:{name:'Natasha Becker Hanson',code:'SUBJECT_07 / BIOINT',intro:'Material confidencial vinculado a Natasha Hanson. Registros civis e pessoais isolados da investigação biológica principal.',photos:['img-nat/natasha.png','img-nat/cozinha.png','img-nat/jardim.png','img-nat/lazer.png','img-nat/shop.png','img-nat/shops2.png']}};
const requested=new URLSearchParams(location.search).get('id');const key=files[requested]?requested:'mick';const data=files[key];if(key==='mei'&&sessionStorage.getItem('dd_mei_access')!=='authorized_v1'){data.photos=[];location.replace('acesso-restrito.html');}document.body.classList.add(`${key}-mode`);document.title=`EVIDÊNCIAS DE ${data.name.toUpperCase()} // DOOMSDAY`;document.getElementById('back').href=`personagem.html?id=${key}`;document.getElementById('intro').textContent=data.intro;document.getElementById('subject').textContent=data.code;document.getElementById('count').textContent=String(data.photos.length).padStart(2,'0');
const archive=document.getElementById('archive');archive.innerHTML=data.photos.map((src,index)=>`<figure class="item" style="--tilt:${[-.8,.6,-.4,.9][index%4]}deg"><span class="number">EVID. ${String(index+1).padStart(2,'0')}</span><button type="button" aria-label="Ampliar evidência ${index+1}"><img src="${src}" alt="Evidência encontrada ${index+1} de ${data.name}" loading="lazy"></button><figcaption>LOTE DD-${key.toUpperCase()} // ARQ_${String(index+1).padStart(3,'0')}</figcaption><span class="classified">RESTRITO</span></figure>`).join('');
const observer=new IntersectionObserver(entries=>entries.forEach(entry=>{if(entry.isIntersecting){entry.target.classList.add('visible');observer.unobserve(entry.target)}}),{threshold:.08});document.querySelectorAll('.item').forEach(item=>observer.observe(item));
const lightbox=document.getElementById('lightbox'),large=lightbox.querySelector('img'),close=lightbox.querySelector('button');archive.addEventListener('click',event=>{const button=event.target.closest('button');if(!button)return;const image=button.querySelector('img');large.src=image.src;large.alt=image.alt;lightbox.classList.add('open');close.focus()});function shut(){lightbox.classList.remove('open');large.src=''}close.addEventListener('click',shut);lightbox.addEventListener('click',event=>{if(event.target===lightbox)shut()});document.addEventListener('keydown',event=>{if(event.key==='Escape')shut()});
</script></body></html>
