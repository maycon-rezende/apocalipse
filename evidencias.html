<body><div class="scan"></div><nav><strong>DD // COFRE DE EVIDÊNCIAS</strong><a id="back" href="personagem.html">← Retornar ao dossiê</a></nav><main><p class="clearance">Autorização aceita // material não catalogado</p><h1>Evidências <span>encontradas</span></h1><p class="intro" id="intro"></p><div class="manifest"><span>Sujeito: <b id="subject"></b></span><span>Itens recuperados: <b id="count"></b></span><span>Integridade: <b>parcial</b></span></div><div class="archive" id="archive"></div></main><div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Evidência ampliada"><button type="button">✕ Fechar registro</button><img src="" alt=""></div><div class="protocol" id="protocol" role="dialog" aria-modal="true" aria-labelledby="protocol-title"><div class="protocol-panel"><span class="protocol-kicker" id="protocol-kicker"></span><h2 id="protocol-title"></h2><p id="protocol-description"></p><div class="protocol-sequence" id="protocol-sequence">AGUARDANDO CREDENCIAL...</div><div class="protocol-options" id="protocol-options"></div><p class="protocol-error" id="protocol-error" aria-live="polite"></p><button class="protocol-close" id="protocol-close" type="button">Cancelar acesso</button></div></div>

  mick:{name:'Mick Bradock',code:'SUBJECT_01 / FBI',intro:'Registros visuais associados a Mick Bradock. Locais, datas e autoria permanecem sob investigação.',photos:['img-bradock/mick.png','img-bradock/mick1.png','img-bradock/mick2.png','img-bradock/mick3.png','img-bradock/mick4.png','img-bradock/mickurbano.png']},

const requested=new URLSearchParams(location.search).get('id');const key=files[requested]?requested:'mick';const data=files[key];if(key==='mei'&&sessionStorage.getItem('dd_mei_access')!=='authorized_v1')location.replace('acesso-restrito.html');document.body.classList.add(`${key}-mode`);document.title=`EVIDÊNCIAS DE ${data.name.toUpperCase()} // DOOMSDAY`;document.getElementById('back').href=`personagem.html?id=${key}`;document.getElementById('intro').textContent=data.intro;document.getElementById('subject').textContent=data.code;const itemCount=data.entries?.length||(data.photos.length+(data.forbidden?.length||0));document.getElementById('count').textContent=String(itemCount).padStart(2,'0');

  document.addEventListener('pointerdown',playMeiVaultTheme,{once:true});document.addEventListener('keydown',playMeiVaultTheme,{once:true});
  if(matchMedia('(hover:hover) and (pointer:fine)').matches){
    const cursor=document.querySelector('.mei-vault-cursor'),coords=cursor.querySelector('span');document.body.classList.add('mei-vault-cursor-ready');
    document.addEventListener('mousemove',event=>{cursor.style.left=`${event.clientX}px`;cursor.style.top=`${event.clientY}px`;coords.textContent=`X:${String(event.clientX).padStart(3,'0')} Y:${String(event.clientY).padStart(3,'0')}`;cursor.classList.toggle('measuring',Boolean(event.target.closest('.item,.manifest,.protocol-panel')))});

const archive=document.getElementById('archive');let forbiddenAuthorized=Boolean(data.protocol&&sessionStorage.getItem(data.protocol.storageKey)==='authorized_v1');
function itemMarkup(src,index,forbidden=false){const number=index+1;if(forbidden&&!forbiddenAuthorized){const privateTitle=key==='mei'?'PROJETO PRIVADO':'ARQUIVO PROIBIDO',privateMeta=key==='mei'?'ESTRUTURA PROTEGIDA // NÍVEL 06':'FONTE PROTEGIDA // NÍVEL 07';return `<figure class="item forbidden visible" style="--tilt:${[-.8,.6,-.4,.9][index%4]}deg"><span class="number">EVID. ${String(number).padStart(2,'0')}</span><button class="forbidden-lock" type="button" aria-label="Solicitar acesso ao arquivo privado ${number}"><span class="lock-copy"><strong>${privateTitle}</strong><span>${privateMeta}</span></span></button><figcaption>${data.protocol.lockedLabel}</figcaption><span class="classified">RESTRITO</span></figure>`}return `<figure class="item${forbidden?' forbidden unlocked':''}" style="--tilt:${[-.8,.6,-.4,.9][index%4]}deg"><span class="number">EVID. ${String(number).padStart(2,'0')}</span><button type="button" aria-label="Ampliar evidência ${number}"><img src="${src}" alt="Evidência encontrada ${number} de ${data.name}" loading="lazy"></button><figcaption>LOTE DD-${key.toUpperCase()} // ${forbidden?'ARQUIVO_DESCLASSIFICADO':`ARQ_${String(number).padStart(3,'0')}`}</figcaption><span class="classified">${forbidden?'DESCLASSIFICADO':'RESTRITO'}</span></figure>`}
function renderArchive(){archive.innerHTML=data.entries?data.entries.map(([src,isPrivate],index)=>itemMarkup(src,index,isPrivate)).join(''):data.photos.map((src,index)=>itemMarkup(src,index)).join('')+(data.forbidden||[]).map((src,index)=>itemMarkup(src,data.photos.length+index,true)).join('');const observer=new IntersectionObserver(entries=>entries.forEach(entry=>{if(entry.isIntersecting){entry.target.classList.add('visible');observer.unobserve(entry.target)}}),{threshold:.08});document.querySelectorAll('.item').forEach(item=>observer.observe(item))}renderArchive();
const protocol=document.getElementById('protocol'),sequence=document.getElementById('protocol-sequence'),protocolError=document.getElementById('protocol-error'),protocolClose=document.getElementById('protocol-close'),protocolOptions=document.getElementById('protocol-options');let entered=[];const credential=data.protocol?.credential||[];if(data.protocol){document.getElementById('protocol-kicker').textContent=data.protocol.kicker;document.getElementById('protocol-title').textContent=data.protocol.title;document.getElementById('protocol-description').textContent=data.protocol.description;protocolOptions.innerHTML=data.protocol.options.map(word=>`<button type="button" data-word="${word}">${word}</button>`).join('')}function closeProtocol(){protocol.classList.remove('open');entered=[];sequence.textContent='AGUARDANDO CREDENCIAL...';protocolError.textContent=''}archive.addEventListener('click',event=>{if(event.target.closest('.forbidden-lock')){protocol.classList.add('open');protocol.querySelector('[data-word]')?.focus();return}const button=event.target.closest('button');if(!button)return;const image=button.querySelector('img');if(!image)return;large.src=image.src;large.alt=image.alt;lightbox.classList.add('open');close.focus()});protocol.querySelectorAll('[data-word]').forEach(button=>button.addEventListener('click',()=>{entered.push(button.dataset.word);sequence.textContent=entered.join(' → ');const position=entered.length-1;if(entered[position]!==credential[position]){protocolError.textContent='CREDENCIAL RECUSADA // ORDEM INCORRETA';entered=[];setTimeout(()=>sequence.textContent='AGUARDANDO CREDENCIAL...',500);return}if(entered.length===credential.length){sessionStorage.setItem(data.protocol.storageKey,'authorized_v1');forbiddenAuthorized=true;protocolError.textContent=key==='mei'?'ESTRUTURA VALIDADA // ABRINDO PROJETO':'FONTE CONFIRMADA // REMOVENDO TARJAS';setTimeout(()=>{closeProtocol();renderArchive()},700)}}));protocolClose.addEventListener('click',closeProtocol);
const lightbox=document.getElementById('lightbox'),large=lightbox.querySelector('img'),close=lightbox.querySelector('button');function shut(){lightbox.classList.remove('open');large.src=''}close.addEventListener('click',shut);lightbox.addEventListener('click',event=>{if(event.target===lightbox)shut()});document.addEventListener('keydown',event=>{if(event.key==='Escape'){shut();closeProtocol()}});
</script></body></html>
