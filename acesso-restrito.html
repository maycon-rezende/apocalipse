<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ACESSO RESTRITO // OBRA EM ANDAMENTO</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Anton&family=Courier+Prime:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
:root{--void:#050708;--blue:#8bd5de;--amber:#e8a33d;--red:#d21f2c;--ink:#e6e3d6;--dim:#8f9b99;--line:#294247;--display:'Anton',sans-serif;--term:'VT323',monospace;--mono:'Courier Prime',monospace}*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;display:grid;place-items:center;padding:6vw;background-color:var(--void);background-image:linear-gradient(rgba(139,213,222,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(139,213,222,.05) 1px,transparent 1px);background-size:30px 30px;color:var(--ink);font-family:var(--mono)}body::after{content:'';position:fixed;inset:0;pointer-events:none;box-shadow:inset 0 0 180px #000;background:repeating-linear-gradient(0deg,transparent 0 3px,rgba(255,255,255,.02) 3px 4px)}.back{position:fixed;z-index:3;left:5vw;top:2rem;color:var(--amber);font:1.05rem var(--term);letter-spacing:.1em;text-transform:uppercase;text-decoration:none}.site{position:relative;z-index:2;width:min(620px,100%);padding:clamp(1.5rem,5vw,3.5rem);border:1px solid var(--line);background:rgba(5,9,10,.9);box-shadow:0 25px 80px #000}.site::before,.site::after{content:'';position:absolute;width:70px;height:70px;border-color:var(--blue);opacity:.45}.site::before{left:-1px;top:-1px;border-left:2px solid;border-top:2px solid}.site::after{right:-1px;bottom:-1px;border-right:2px solid;border-bottom:2px solid}.status{color:var(--red);font:1rem var(--term);letter-spacing:.2em;text-transform:uppercase}.status::before{content:'●';margin-right:.5rem;animation:blink 1.2s steps(2) infinite}h1{font:clamp(2.8rem,9vw,5rem)/.95 var(--display);text-transform:uppercase;margin:.8rem 0}.subtitle{color:var(--blue);font:1.2rem var(--term);letter-spacing:.12em;text-transform:uppercase}.notice{margin:1.5rem 0;color:var(--dim);line-height:1.7}.construction{display:flex;gap:.6rem;align-items:center;margin:1.5rem 0;padding:.7rem;border-block:1px dashed var(--line);color:var(--amber);font:1rem var(--term);letter-spacing:.1em;text-transform:uppercase}.construction span{display:block;flex:1;height:8px;background:repeating-linear-gradient(-45deg,var(--amber) 0 8px,#171717 8px 16px)}label{display:block;color:var(--dim);font:1rem var(--term);letter-spacing:.1em;text-transform:uppercase}input{width:100%;min-height:50px;margin:.45rem 0 .8rem;padding:.7rem 1rem;border:1px solid var(--line);outline:0;background:#020303;color:var(--ink);font:1.1rem var(--mono)}input:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(139,213,222,.08)}button{width:100%;min-height:48px;border:1px solid var(--blue);background:rgba(139,213,222,.07);color:var(--blue);font:1.1rem var(--term);letter-spacing:.12em;text-transform:uppercase;cursor:pointer}button:hover{background:var(--blue);color:#071011}.message{min-height:1.6rem;margin-top:.8rem;font:1.05rem var(--term);letter-spacing:.09em;text-transform:uppercase}.message.denied{color:var(--red);animation:shake .3s}.message.accepted{color:#3ddc84}@keyframes blink{50%{opacity:.25}}@keyframes shake{25%{translate:-5px 0}75%{translate:5px 0}}@media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body><a class="back" href="personagem.html?id=mei">← Retornar ao dossiê</a><main class="site"><p class="status">Arquivo incompleto</p><h1>Acesso restrito</h1><p class="subtitle">Projeto Mei // obra em andamento</p><p class="notice">Este setor ainda está sendo construído. Plantas, registros e evidências permanecem isolados até a conclusão do arquivo.</p><div class="construction"><span></span> Área interditada <span></span></div><form id="gate"><label for="password">Código de autorização</label><input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required><button type="submit">Validar credencial</button><p class="message" id="message" aria-live="polite"></p></form></main>
<script>
const expected='aae44f97a661a4525ff9f547b5cbf3cb42092ac477f81f4e80f2492f4a5e1992';const form=document.getElementById('gate'),field=document.getElementById('password'),message=document.getElementById('message');async function digest(value){const bytes=new TextEncoder().encode(value);const hash=await crypto.subtle.digest('SHA-256',bytes);return [...new Uint8Array(hash)].map(byte=>byte.toString(16).padStart(2,'0')).join('')}form.addEventListener('submit',async event=>{event.preventDefault();message.className='message';if(await digest(field.value)===expected){sessionStorage.setItem('dd_mei_access','authorized_v1');message.textContent='Credencial aceita // liberando arquivo...';message.classList.add('accepted');setTimeout(()=>location.href='evidencias.html?id=mei',900)}else{message.textContent='Acesso negado // credencial inválida';message.classList.add('denied');field.value='';field.focus()}});
</script></body></html>
